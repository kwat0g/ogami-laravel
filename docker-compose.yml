services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: ${APP_BUILD_TARGET:-development}
    container_name: ogami_app
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=${APP_ENV:-local}
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - REVERB_HOST=reverb
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - ogami_storage:/var/www/html/storage
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ogami_net

  postgres:
    image: postgres:16-alpine
    container_name: ogami_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-ogami_erp}
      POSTGRES_USER: ${DB_USERNAME:-ogami}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "127.0.0.1:5432:5432"  # Bind to localhost only — do not expose to public network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ogami} -d ${DB_DATABASE:-ogami_erp}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ogami_net

  redis:
    image: redis:7-alpine
    container_name: ogami_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-secret}
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"  # Bind to localhost only — do not expose to public network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-secret}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - ogami_net

  horizon:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ogami_horizon
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=${APP_ENV:-local}
      - DB_HOST=postgres
      - REDIS_HOST=redis
    command: ["php", "artisan", "horizon"]
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
      - ogami_storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ogami_net
    profiles:
      - production

  reverb:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: ogami_reverb
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=${APP_ENV:-local}
      - DB_HOST=postgres
      - REDIS_HOST=redis
    command: ["php", "artisan", "reverb:start", "--host=0.0.0.0", "--port=8080"]
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    ports:
      - "8080:8080"
    depends_on:
      app:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - ogami_net
    profiles:
      - production

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  ogami_storage:
    driver: local

networks:
  ogami_net:
    driver: bridge
