[www]
user = www-data
group = www-data
listen = 127.0.0.1:9000
pm = dynamic
# Connection budget (DB_PERSISTENT=false — see .env):
#   pm.max_children (20) + 2 queue + 1 scheduler + 1 pulse + 1 reverb = ~25 peak
#   Default PostgreSQL max_connections=100 gives 4× headroom. Safe.
#   If you scale max_children above 75, also raise pg max_connections.
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 5
pm.max_spare_servers = 10
pm.max_requests = 500
access.log = /dev/null
catch_workers_output = yes
php_admin_flag[log_errors] = on
