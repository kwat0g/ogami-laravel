; Development PHP configuration
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
memory_limit = 256M
max_execution_time = 120
upload_max_filesize = 50M
post_max_size = 50M

; OPcache disabled in dev for real-time changes
opcache.enable = 0

[xdebug]
; Uncomment to enable Xdebug (install extension separately)
; xdebug.mode = debug
; xdebug.client_host = host.docker.internal
; xdebug.client_port = 9003
