# HTTP — redirect all traffic to HTTPS, but allow ACME challenges for cert renewal
server {
    listen 80;
    server_name ogamiph.dev www.ogamiph.dev;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html/public;
    }

    location / {
        return 301 https://ogamiph.dev$request_uri;
    }
}

# HTTPS — main application server
server {
    listen 443 ssl;
    server_name ogamiph.dev www.ogamiph.dev;
    root /var/www/html/public;
    index index.php;

    charset utf-8;

    # SSL certificates (Let's Encrypt, mounted from host)
    ssl_certificate     /etc/letsencrypt/live/ogamiph.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ogamiph.dev/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers — kept in sync with SecurityHeadersMiddleware.php
    add_header X-Frame-Options                          "SAMEORIGIN" always;
    add_header X-Content-Type-Options                   "nosniff" always;
    add_header X-XSS-Protection                         "1; mode=block" always;
    add_header Referrer-Policy                          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy                       "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy               "same-origin" always;
    add_header Cross-Origin-Embedder-Policy             "unsafe-none" always;
    add_header Cross-Origin-Resource-Policy             "same-site" always;
    add_header Content-Security-Policy                  "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self' wss:; frame-ancestors 'self'; form-action 'self'; base-uri 'self'; object-src 'none'; media-src 'none'; worker-src 'self'" always;
    add_header Strict-Transport-Security                "max-age=31536000; includeSubDomains" always;
    proxy_hide_header X-Powered-By;

    # WebSocket proxy for Laravel Reverb (wss://ogamiph.dev/app/...)
    location ^~ /app/ {
        proxy_pass http://reverb:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600;
        access_log off;
    }

    # Serve compiled Vite/React assets.
    # vite.config.ts uses base='/build/' in production builds, so asset URLs
    # are /build/assets/x.js — served from public/build/assets/ via try_files.
    # The explicit ^~ block ensures proper cache headers and bypasses PHP fallback.
    location ^~ /build/ {
        root /var/www/html/public;
        try_files $uri =404;
        expires max;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        fastcgi_param SERVER_PORT 443;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires max;
        log_not_found off;
        access_log off;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}
