# 🔍 ERP SYSTEM — MODULE DISCOVERY & COMPLETENESS AUDIT PROMPT

> **How to use this prompt:**
> Paste this into any AI (Claude, Cursor, ChatGPT, etc.) alongside your codebase,
> route files, database schema, API definitions, folder structure, and any docs you have.
> The AI will first **discover** what modules you actually have, then evaluate each one
> for completeness — without assuming anything that isn't in your codebase.

---

## INSTRUCTIONS TO THE AI

You are a **senior ERP systems architect** performing a **discovery-first completeness audit**.

Your job has two phases:

**Phase 1 — DISCOVER:** Scan everything provided (codebase, routes, schema, folder structure,
config files, API definitions, menu configs, sidebar navigation, permission lists, etc.)
and build a complete map of what this system actually contains.
Do NOT assume any module exists unless you find evidence of it.

**Phase 2 — EVALUATE:** For each module and sub-module you discovered,
evaluate how complete it is — what features are fully built, partially built,
missing, or need improvement. Then recommend what gaps should be filled
based on the purpose and context of each module you found.

### Your Prime Directive: Discover First, Assume Nothing

- Do NOT invent modules that aren't in the codebase.
- Do NOT assume a module is "standard" for ERP and flag it missing if it was never intended.
- If you find a `HRModule`, evaluate HR completeness only based on what HR features you discovered.
- If this system has no Manufacturing module at all, do NOT flag it as missing — ask first
  whether it is intended to be part of this system.
- Only suggest new modules or features that logically belong based on
  what already exists and the evident purpose of the system.

---

---

# PHASE 1 — SYSTEM DISCOVERY

---

## Step 1.1 — Locate All Entry Points

Scan the following to discover every module, feature, and sub-system:

**In the codebase:**
- Top-level folder and file structure
- Module registration files (e.g., `app.module.ts`, `modules/index.ts`,
  `config/modules.php`, `app/Http/Kernel.php`, `routes/index.ts`, etc.)
- Router files (all route definitions — REST, GraphQL resolvers, tRPC routers, file-based routes)
- Sidebar / navigation config files (these often define the full feature map of the app)
- Permission / role definition files (permissions usually map 1:1 to features)
- Menu configuration files or constants

**In the database schema:**
- Every table or collection — group them by apparent domain
- Foreign key relationships — these reveal module boundaries
- Naming prefixes or namespaces in table names
  (e.g., `hr_employees`, `fin_journals`, `inv_items`)

**In the API layer:**
- Every controller, resolver, or handler — group by module/namespace
- Every defined endpoint or operation
- Swagger/OpenAPI spec (if exists)

**In the frontend:**
- Every page, screen, or view component
- Every route defined in the frontend router
- Every section in the navigation / sidebar

**In tests:**
- Test file names and describe blocks often reveal features
  (e.g., `leave-management.spec.ts` = leave management feature exists)

**In documentation:**
- README files
- Any wiki pages, Notion docs, or inline documentation
- `CHANGELOG.md` (reveals features added over time)

---

## Step 1.2 — Build the Module Map

After scanning everything, produce a **Module Discovery Map** in this format:

```
MODULE: [Name you identified from the codebase]
EVIDENCE FOUND IN:
  - Folders: [list paths]
  - DB Tables: [list tables that belong to this module]
  - API Routes/Controllers: [list]
  - Frontend Pages/Routes: [list]
  - Permission Keys: [list]
  - Test Files: [list]
  - Navigation/Menu Entries: [list]

SUB-MODULES / FEATURES DISCOVERED:
  - [feature 1]: found in [where]
  - [feature 2]: found in [where]
  - [feature 3]: found in [where]
  ...

CONFIDENCE: High | Medium | Low
  (High = clear evidence in multiple layers;
   Medium = found in some layers but not all;
   Low = only found in one place, may be scaffolded/abandoned)
```

Repeat for every module you discover.

---

## Step 1.3 — Identify Ambiguous or Orphaned Code

Flag anything you find that doesn't clearly belong to a module:

- Files or tables that seem related to a feature but don't connect to any route or UI
- Scaffolded but empty modules (folder exists, no real logic inside)
- Commented-out route registrations for features that may have been disabled
- DB tables with no corresponding model or service
- API endpoints that have no corresponding frontend page
- Frontend pages that call no real API (hardcoded/mocked data)

```
ORPHANED / AMBIGUOUS:
  ITEM: [file, table, route, or component name]
  LOCATION: [path]
  OBSERVATION: [what you found]
  QUESTION: [what you need clarified to classify it]
```

---

## Step 1.4 — Determine System Purpose

Based on everything discovered, answer:

- What type of ERP system is this? What is its primary business domain?
  (e.g., HR-focused, manufacturing, retail, services, construction, healthcare, etc.)
- Who appears to be the end user? (enterprise, SMB, specific industry?)
- What seems to be the core workflow this system is built around?
- What modules appear to be the most mature and central?
- What modules appear to be early-stage or secondary?
- Are there any features that suggest integrations with external systems?

This context will guide the gap analysis in Phase 2.

