# PHASE 3 — CROSS-MODULE ANALYSIS

---

## Step 3.1 — Integration Map

After evaluating all modules individually, map how they connect to each other.

For every pair of modules that share data or trigger actions in each other:

```
FROM MODULE: [source]
TO MODULE: [target]
INTEGRATION TYPE: [data sync | event trigger | shared table | API call | queue job]
DIRECTION: [one-way | two-way]
CURRENT STATUS:
  - EXISTS: [yes / no / partial]
  - HOW IT WORKS: [describe the mechanism if it exists]
  - WHAT'S BROKEN: [describe the gap if partial or missing]
BUSINESS IMPACT OF GAP: [what breaks for the user if this integration is missing]
FIX PRIORITY: 🔴 Critical | 🟠 High | 🟡 Medium | 🟢 Low
```

---

## Step 3.2 — Workflow Completeness

Identify the **end-to-end business workflows** that span multiple modules.
For each workflow you can infer from the system:

```
WORKFLOW: [Name — e.g., "Employee Onboarding", "Purchase to Pay", "Order to Cash"]
MODULES INVOLVED: [list]
STEPS:
  Step 1: [description] → handled by [module/feature] → STATUS: [✅ / 🔨 / ❌]
  Step 2: [description] → handled by [module/feature] → STATUS: [✅ / 🔨 / ❌]
  Step 3: [description] → handled by [module/feature] → STATUS: [✅ / 🔨 / ❌]
  ...
BROKEN STEPS: [which steps fail or have no implementation]
END-TO-END COMPLETENESS: [X%]
BIGGEST BLOCKER: [what single thing would most improve this workflow]
```

---

## Step 3.3 — Shared Infrastructure Gaps

Evaluate system-wide capabilities that all modules depend on.
Only evaluate what you find evidence of — do not assume these exist:

For each of the following, check if it exists and how well it works:

- **Approval / workflow engine** — is there a centralized one or is every approval hardcoded?
- **Notification system** — is there a unified way to send alerts across modules?
- **Audit trail** — is change history tracked consistently, or only in some modules?
- **File / document attachment** — can documents be attached to records in all modules?
- **Number series / sequencing** — are document numbers (PO-0001, INV-0001) centrally managed?
- **Permission system** — is RBAC applied consistently across all modules?
- **Reporting infrastructure** — do all modules share a common reporting layer?
- **Search** — is there a global search across modules?
- **Activity / history feed** — can users see what happened to a record over time?

For each found, evaluate: fully built / partial / missing.
For each not found: assess whether it's needed based on system complexity.

