name: CI

on:
  push:
    branches: [main, full-changes]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: PHP 8.3 + PostgreSQL 16 ──────────────────────────────────────
  backend:
    name: Backend (Pint · PHPStan · Pest)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ogami_erp_test
          POSTGRES_USER: ogami
          POSTGRES_PASSWORD: secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ogami -d ogami_erp_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: pdo_pgsql, pgsql, mbstring, zip, exif, pcntl, bcmath, gd, intl, xml, xsl, soap, sockets, redis
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      # ── Code Style ──────────────────────────────────────────────────────────
      - name: Code Style (Laravel Pint)
        run: ./vendor/bin/pint --test

      # ── Static Analysis ─────────────────────────────────────────────────────
      - name: Static Analysis (PHPStan)
        run: ./vendor/bin/phpstan analyse --no-progress --memory-limit=512M

      # ── Tests ────────────────────────────────────────────────────────────────
      - name: Run Pest (Unit + Feature + Integration + Arch)
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: ogami_erp_test
          DB_USERNAME: ogami
          DB_PASSWORD: secret
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
          MAIL_MAILER: array
          BROADCAST_CONNECTION: log
          PULSE_ENABLED: false
          REDIS_CLIENT: phpredis
          REDIS_HOST: 127.0.0.1
          REDIS_PASSWORD: ''
        run: ./vendor/bin/pest --ci

  # ── Frontend: Node 22 + pnpm ──────────────────────────────────────────────
  frontend:
    name: Frontend (Lint · Typecheck · Vitest)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '10.30.1'

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: pnpm-

      - name: Install frontend dependencies
        run: cd frontend && pnpm install --frozen-lockfile

      # ── Lint ──────────────────────────────────────────────────────────────
      - name: ESLint
        run: cd frontend && pnpm lint

      # ── Typecheck ─────────────────────────────────────────────────────────
      - name: TypeScript typecheck
        run: cd frontend && pnpm typecheck

      # ── Prettier ──────────────────────────────────────────────────────────
      - name: Prettier check
        run: cd frontend && pnpm format:check

      # ── Unit Tests ────────────────────────────────────────────────────────
      - name: Vitest
        run: cd frontend && pnpm test
