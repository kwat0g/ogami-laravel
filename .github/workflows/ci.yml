          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: ogami_erp_test
          DB_USERNAME: ogami
          DB_PASSWORD: secret
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: file
          MAIL_MAILER: array
          BROADCAST_CONNECTION: log
          PULSE_ENABLED: false
          REDIS_CLIENT: phpredis
          REDIS_HOST: 127.0.0.1
